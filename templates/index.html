<!DOCTYPE html>
<html>
<head>
    <title>SafePath</title>
</head>
<body>
    <h1>SafePath</h1>
    <p>Compare safer and faster travel routes.</p>

    <form action="/route" method="POST">
        <p>
            <label>Starting Location:</label><br>
            <input type="text" name="start_location" required>
        </p>

        <p>
            <label>Destination:</label><br>
            <input type="text" name="destination" required>
        </p>

        <button type="submit">Compare Routes</button>
    </form>
</body>
</html>
